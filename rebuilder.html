<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeSub Pro — Merger & Rebuilder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #080810;
            --surface: #0f0f1a;
            --card:    #141420;
            --border:  #1e1e30;
            --accent:  #00e5ff;
            --accent2: #00b8d4;
            --glow:    rgba(0,229,255,0.2);
            --text:    #e8e8f0;
            --muted:   #6b6b88;
            --dim:     #282838;
            --success: #00e5a0;
            --error:   #ff4060;
            --warn:    #ffab40;
            --mono:    'Space Mono', monospace;
            --sans:    'DM Sans', 'Myanmar Text', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }

        /* ── NAV ── */
        .nav {
            display: flex; gap: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 32px;
            position: relative; z-index: 1;
        }
        .nav a {
            text-decoration: none;
            color: var(--muted);
            font-size: 0.82rem; font-weight: 600;
            padding: 8px 18px; border-radius: 7px;
            transition: all 0.2s;
        }
        .nav a:hover { color: var(--text); background: var(--dim); }
        .nav a.active { color: #000; background: var(--accent); box-shadow: 0 0 16px var(--glow); }

        /* ── HEADER ── */
        .page-header { text-align: center; margin-bottom: 28px; position: relative; z-index: 1; }
        .page-header h1 { font-family: var(--mono); font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; }
        .page-header h1 span { color: var(--accent); }
        .page-header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

        /* ── WRAP ── */
        .wrap {
            width: 100%; max-width: 1200px;
            display: flex; flex-direction: column; gap: 20px;
            position: relative; z-index: 1;
        }

        /* ── INPUT GRID ── */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex; flex-direction: column;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .panel-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .panel-title {
            font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--accent);
            display: flex; align-items: center; gap: 8px;
        }
        .badge {
            background: var(--bg); color: var(--text);
            padding: 2px 10px; border-radius: 20px;
            font-family: var(--mono); font-size: 0.72rem;
        }
        .badge.mismatch { background: var(--error); color: #fff; }

        textarea {
            flex: 1;
            background: var(--dim);
            border: 1px solid var(--border);
            color: #fff;
            padding: 10px 12px;
            border-radius: 7px;
            resize: none;
            font-family: var(--mono);
            font-size: 0.82rem;
            line-height: 1.6;
            min-height: 260px;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }
        textarea::placeholder { color: #3a3a55; }

        /* ── OPTIONS ── */
        .options-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
        }
        .opt-label { font-size: 0.8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; }
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn {
            background: var(--dim); border: 1px solid var(--border);
            color: var(--muted); font-size: 0.78rem; font-weight: 600;
            padding: 5px 14px; border-radius: 20px;
            cursor: pointer; transition: all 0.18s;
        }
        .toggle-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

        /* ── CONTROLS ── */
        .controls {
            display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 28px; border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--dim); color: var(--text);
            font-family: var(--sans); font-weight: 600; font-size: 0.9rem;
            cursor: pointer; transition: all 0.18s;
        }
        .btn:hover { background: #30303f; border-color: var(--accent); }
        .btn-accent { background: var(--accent); color: #000; border: none; box-shadow: 0 4px 20px var(--glow); }
        .btn-accent:hover { background: var(--accent2); transform: translateY(-1px); }
        .btn-success { background: #003a2a; color: var(--success); border-color: #005a3c; }
        .btn-success:hover { background: #004d38; }

        /* ── OUTPUT ── */
        .output-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: none;
        }

        .status-box {
            padding: 10px 14px;
            border-radius: 7px;
            background: var(--card);
            font-family: var(--mono);
            font-size: 0.82rem;
            margin-bottom: 12px;
            border-left: 3px solid var(--muted);
            line-height: 1.5;
        }
        .status-ok   { border-left-color: var(--success); color: var(--success); }
        .status-warn { border-left-color: var(--warn);    color: var(--warn);    }
        .status-error{ border-left-color: var(--error);   color: var(--error);   }

        .error-list {
            max-height: 100px; overflow-y: auto;
            background: rgba(255,64,96,0.06);
            border: 1px solid #3a1020;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 12px;
            font-family: var(--mono); font-size: 0.75rem;
            color: var(--error);
            display: none;
        }

        .out-actions {
            display: flex; gap: 10px; justify-content: flex-end;
            margin-top: 12px; flex-wrap: wrap;
        }

        /* ── FIND & REPLACE ── */
        .fnr-panel {
            margin-top: 14px;
            border: 1px solid #0a2a3a;
            border-radius: 8px;
            background: rgba(0,229,255,0.03);
            overflow: hidden;
        }
        .fnr-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 14px;
            background: rgba(0,229,255,0.06);
            border-bottom: 1px solid #0a2a3a;
            cursor: pointer; user-select: none;
        }
        .fnr-title { font-size: 0.78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .fnr-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
        .fnr-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .fnr-input {
            flex: 1; min-width: 140px;
            background: var(--dim); border: 1px solid var(--border);
            color: #fff; padding: 8px 12px; border-radius: 6px;
            font-family: var(--mono); font-size: 0.82rem;
            transition: border-color 0.2s;
        }
        .fnr-input:focus { border-color: var(--accent); }
        .fnr-input::placeholder { color: #3a3a55; }
        .fnr-label { font-size: 0.75rem; color: var(--muted); min-width: 65px; font-weight: 600; }
        .fnr-count { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); min-width: 80px; }
        .btn-fnr {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 6px;
            border: 1px solid var(--border); background: var(--dim);
            color: var(--text); font-family: var(--sans); font-weight: 600;
            font-size: 0.8rem; cursor: pointer; transition: all 0.18s; white-space: nowrap;
        }
        .btn-fnr:hover { background: #30303f; border-color: var(--accent); }
        .btn-fnr.danger { border-color: #ff4060; color: #ff8080; }
        .btn-fnr.danger:hover { background: rgba(255,64,96,0.15); }
        .fnr-highlight { background: rgba(255,200,0,0.35); border-radius: 2px; }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: #000;
            padding: 12px 24px; border-radius: 8px;
            font-weight: 700; font-size: 0.88rem;
            z-index: 999; opacity: 0;
            transition: all 0.3s; pointer-events: none; white-space: nowrap;
        }
        #toast.show { opacity: 1; bottom: 36px; }

        @media (max-width: 700px) {
            .input-grid { grid-template-columns: 1fr; }
            textarea { min-height: 180px; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html">📝 Editor & Splitter</a>
    <a href="rebuilder.html" class="active">🔗 Merger & Rebuilder</a>
    <a href="splitter.html">➗ Text Divider</a>
    <a href="corrector.html">✅ Correction Applier</a>
</nav>

<div class="page-header">
    <h1>AnimeSub <span>Rebuilder</span></h1>
    <p>Header + Text → Complete ASS Dialogue Lines</p>
</div>

<div class="wrap">

    <!-- INPUT GRID -->
    <div class="input-grid">
        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">1. Headers</span>
                <span class="badge" id="headerCount">0 lines</span>
            </div>
            <textarea id="inputHeader"
                placeholder="Dialogue: 0,0:00:01.00,0:00:03.00,Default,,0,0,0,,"
            ></textarea>
        </div>
        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">2. Translated Text</span>
                <span class="badge" id="textCount">0 lines</span>
            </div>
            <textarea id="inputText"
                placeholder="မင်္ဂလာပါ ကမ္ဘာလောက&#10;ဒါစမ်းသပ်မှုတစ်ခုပါ"
            ></textarea>
        </div>
    </div>

    <!-- OPTIONS -->
    <div class="options-bar">
        <span class="opt-label">Trailing comma if missing:</span>
        <div class="toggle-group">
            <button class="toggle-btn active" id="commaYes" onclick="setCommaMode(true)">Auto-add ✓</button>
            <button class="toggle-btn"        id="commaNo"  onclick="setCommaMode(false)">Keep as-is</button>
        </div>

        <span class="opt-label" style="margin-left:12px;">Skip blank pairs:</span>
        <div class="toggle-group">
            <button class="toggle-btn active" id="skipYes" onclick="setSkipMode(true)">Yes ✓</button>
            <button class="toggle-btn"        id="skipNo"  onclick="setSkipMode(false)">No</button>
        </div>
    </div>

    <!-- MERGE BUTTON -->
    <div class="controls">
        <button class="btn btn-accent" onclick="rebuildLines()">🔗 Merge & Rebuild</button>
        <button class="btn" onclick="clearAll()">🗑️ Clear All</button>
    </div>

    <!-- OUTPUT -->
    <div class="output-panel" id="outputPanel">
        <div class="panel-head">
            <span class="panel-title" style="color: var(--success)">3. Result</span>
            <span class="badge" id="resultCount">0 lines</span>
        </div>
        <div class="status-box" id="statusBox">—</div>
        <div class="error-list" id="errorList"></div>
        <textarea id="outputResult" style="min-height: 200px; border-color: #005a3c;" readonly></textarea>

        <!-- FIND & REPLACE -->
        <div class="fnr-panel" id="fnrPanel">
            <div class="fnr-head" onclick="toggleFnr()">
                <span class="fnr-title">🔍 Find &amp; Replace</span>
                <span id="fnrToggleIcon" style="color:var(--muted); font-size:0.8rem;">▼ open</span>
            </div>
            <div class="fnr-body" id="fnrBody" style="display:none;">
                <div class="fnr-row">
                    <span class="fnr-label">Find:</span>
                    <input class="fnr-input" id="fnrFind" placeholder="ရှာမည့် စာသား..." oninput="fnrPreview()">
                    <span class="fnr-count" id="fnrCount"></span>
                    <label style="font-size:0.75rem; color:var(--muted); display:flex; align-items:center; gap:5px; cursor:pointer; white-space:nowrap;">
                        <input type="checkbox" id="fnrRegex" onchange="fnrPreview()" style="accent-color:var(--accent);"> Regex
                    </label>
                    <label style="font-size:0.75rem; color:var(--muted); display:flex; align-items:center; gap:5px; cursor:pointer; white-space:nowrap;">
                        <input type="checkbox" id="fnrCase" onchange="fnrPreview()" style="accent-color:var(--accent);"> Case
                    </label>
                </div>
                <div class="fnr-row">
                    <span class="fnr-label">Replace:</span>
                    <input class="fnr-input" id="fnrReplace" placeholder="ပြောင်းမည့် စာသား... (blank = delete)">
                    <button class="btn-fnr" onclick="doReplace()">Replace All</button>
                    <button class="btn-fnr danger" onclick="doDelete()">🗑 Delete All</button>
                </div>
                <div id="fnrMsg" style="font-size:0.75rem; color:var(--success); font-family:var(--mono); display:none;"></div>
            </div>
        </div>

        <div class="out-actions">
            <button class="btn" onclick="copyResult()">📋 Copy</button>
            <button class="btn btn-success" onclick="downloadResult()">💾 Download .ass</button>
        </div>
    </div>

</div>

<div id="toast"></div>

<script>
    // ── Options state ──────────────────────────────────
    let autoComma = true;
    let skipBlank  = true;

    function setCommaMode(v) {
        autoComma = v;
        document.getElementById('commaYes').classList.toggle('active', v);
        document.getElementById('commaNo').classList.toggle('active', !v);
    }
    function setSkipMode(v) {
        skipBlank = v;
        document.getElementById('skipYes').classList.toggle('active', v);
        document.getElementById('skipNo').classList.toggle('active', !v);
    }

    // ── Live line count (Bug fix: filter truly empty lines only) ──
    function countNonEmpty(str) {
        return str.split(/\r?\n/).filter(l => l.trim() !== '').length;
    }

    const inputHeader = document.getElementById('inputHeader');
    const inputText   = document.getElementById('inputText');

    function updateCounts() {
        const hc = countNonEmpty(inputHeader.value);
        const tc = countNonEmpty(inputText.value);

        const hBadge = document.getElementById('headerCount');
        const tBadge = document.getElementById('textCount');

        hBadge.textContent = `${hc} lines`;
        tBadge.textContent = `${tc} lines`;

        const mismatch = hc > 0 && tc > 0 && hc !== tc;
        hBadge.className = 'badge' + (mismatch ? ' mismatch' : '');
        tBadge.className = 'badge' + (mismatch ? ' mismatch' : '');
    }

    inputHeader.addEventListener('input', updateCounts);
    inputText.addEventListener('input', updateCounts);

    // ── Rebuild (Bug fix: empty line handling) ─────────
    function rebuildLines() {
        // Split preserving blank lines for positional alignment
        const headers = inputHeader.value.split(/\r?\n/);
        const texts   = inputText.value.split(/\r?\n/);

        const combined = [];
        const errors   = [];

        const maxLen = Math.max(headers.length, texts.length);

        for (let i = 0; i < maxLen; i++) {
            const h = (headers[i] ?? '').trimEnd();
            const t = (texts[i]  ?? '').trimEnd();

            // Skip blank pairs if option enabled
            if (skipBlank && h.trim() === '' && t.trim() === '') continue;

            // Track mismatches
            if (h.trim() === '' && t.trim() !== '') {
                errors.push(`Line ${i+1}: Missing header (text: "${t.substring(0,30)}...")`);
            } else if (h.trim() !== '' && t.trim() === '') {
                errors.push(`Line ${i+1}: Missing text (header: "${h.substring(0,30)}...")`);
            }

            let header = h;
            if (autoComma && header.trim().length > 0 && !header.endsWith(',')) {
                header += ',';
            }

            combined.push(header + t);
        }

        // Render output
        const out    = document.getElementById('outputResult');
        const status = document.getElementById('statusBox');
        const errDiv = document.getElementById('errorList');
        const panel  = document.getElementById('outputPanel');

        out.value = combined.join('\n');
        document.getElementById('resultCount').textContent = `${combined.length} lines`;
        panel.style.display = 'block';
        panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

        if (errors.length === 0) {
            status.className  = 'status-box status-ok';
            status.textContent = `✅ Success! Merged ${combined.length} lines perfectly.`;
            errDiv.style.display = 'none';
        } else {
            status.className  = 'status-box status-warn';
            status.textContent = `⚠️  Merged ${combined.length} lines with ${errors.length} issue(s). Check below:`;
            errDiv.style.display = 'block';
            errDiv.innerHTML = errors.map(e => `• ${e}`).join('<br>');
        }
    }

    // ── Copy ───────────────────────────────────────────
    function copyResult() {
        const v = document.getElementById('outputResult').value;
        if (!v.trim()) { toast('Nothing to copy!', true); return; }
        navigator.clipboard.writeText(v).then(() => toast('Copied to clipboard!'));
    }

    // ── Download as .ass ───────────────────────────────
    function downloadResult() {
        const v = document.getElementById('outputResult').value;
        if (!v.trim()) { toast('Nothing to download!', true); return; }
        const blob = new Blob([v], { type: 'text/plain;charset=utf-8' });
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(blob),
            download: 'rebuilt_lines.ass'
        });
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(a.href);
        toast('Downloaded rebuilt_lines.ass!');
    }

    // ── Clear ──────────────────────────────────────────
    function clearAll() {
        inputHeader.value = '';
        inputText.value   = '';
        document.getElementById('outputPanel').style.display = 'none';
        document.getElementById('outputResult').value = '';
        document.getElementById('fnrCount').textContent = '';
        document.getElementById('fnrMsg').style.display = 'none';
        updateCounts();
    }

    // ── Find & Replace ─────────────────────────────────
    function toggleFnr() {
        const body = document.getElementById('fnrBody');
        const icon = document.getElementById('fnrToggleIcon');
        const open = body.style.display === 'none';
        body.style.display = open ? 'flex' : 'none';
        icon.textContent   = open ? '▲ close' : '▼ open';
        if (open) document.getElementById('fnrFind').focus();
    }

    function buildRegex() {
        const find    = document.getElementById('fnrFind').value;
        const useRe   = document.getElementById('fnrRegex').checked;
        const useCase = document.getElementById('fnrCase').checked;
        if (!find) return null;
        try {
            const pattern = useRe ? find : find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const flags   = 'g' + (useCase ? '' : 'i');
            return new RegExp(pattern, flags);
        } catch(e) {
            toast('Invalid regex: ' + e.message, true);
            return null;
        }
    }

    function fnrPreview() {
        const ta    = document.getElementById('outputResult');
        const count = document.getElementById('fnrCount');
        const re    = buildRegex();
        if (!re || !ta.value) { count.textContent = ''; return; }
        const matches = ta.value.match(re);
        count.textContent = matches ? `${matches.length} match${matches.length > 1 ? 'es' : ''}` : '0 matches';
    }

    function doReplace() {
        const ta      = document.getElementById('outputResult');
        const replace = document.getElementById('fnrReplace').value;
        const re      = buildRegex();
        const msg     = document.getElementById('fnrMsg');
        if (!re) return;
        if (!ta.value.trim()) { toast('Output is empty!', true); return; }

        const before  = ta.value;
        const matches = before.match(re);
        if (!matches) { toast('No matches found', true); return; }

        ta.value = before.replace(re, replace);
        // make editable if not already
        ta.removeAttribute('readonly');

        msg.style.display = 'block';
        msg.textContent   = `✅ Replaced ${matches.length} occurrence${matches.length > 1 ? 's' : ''}.`;
        fnrPreview();
        // update line count
        const lineCount = ta.value.split('\n').filter(l => l.trim()).length;
        document.getElementById('resultCount').textContent = `${lineCount} lines`;
        toast(`Replaced ${matches.length} occurrence(s)`);
    }

    function doDelete() {
        document.getElementById('fnrReplace').value = '';
        doReplace();
    }

    // Make output editable after merge
    document.getElementById('outputResult').addEventListener('focus', function() {
        this.removeAttribute('readonly');
    });

    // ── Toast ──────────────────────────────────────────
    let toastTimer;
    function toast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.background = isError ? '#ff4444' : 'var(--success)';
        el.style.color = isError ? '#fff' : '#000';
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }
</script>
</body>
</html>
