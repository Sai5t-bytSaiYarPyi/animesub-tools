<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeSub Pro — Text Divider</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:      #080810;
            --surface: #0f0f1a;
            --card:    #141420;
            --border:  #1e1e30;
            --accent:  #ffab40;
            --accent2: #ff8f00;
            --glow:    rgba(255,171,64,0.2);
            --text:    #e8e8f0;
            --muted:   #6b6b88;
            --dim:     #282838;
            --success: #00e5a0;
            --mono:    'Space Mono', monospace;
            --sans:    'DM Sans', 'Myanmar Text', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,171,64,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,171,64,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; z-index: 0;
        }

        /* ── NAV ── */
        .nav {
            display: flex; gap: 4px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 5px;
            margin-bottom: 32px;
            position: relative; z-index: 1;
            flex-wrap: wrap; justify-content: center;
        }
        .nav a {
            text-decoration: none; color: var(--muted);
            font-size: 0.82rem; font-weight: 600;
            padding: 8px 16px; border-radius: 7px;
            transition: all 0.2s;
        }
        .nav a:hover { color: var(--text); background: var(--dim); }
        .nav a.active { color: #000; background: var(--accent); box-shadow: 0 0 16px var(--glow); }

        /* ── HEADER ── */
        .page-header { text-align: center; margin-bottom: 28px; position: relative; z-index: 1; }
        .page-header h1 { font-family: var(--mono); font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; }
        .page-header h1 span { color: var(--accent); }
        .page-header p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

        /* ── WRAP ── */
        .wrap { width: 100%; max-width: 920px; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; }

        /* ── INPUT CARD ── */
        .input-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .input-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .card-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); }
        .line-badge { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }

        textarea {
            width: 100%;
            background: var(--dim); border: 1px solid var(--border);
            color: #fff; padding: 10px 12px; border-radius: 7px;
            resize: vertical; font-family: var(--mono); font-size: 0.82rem;
            line-height: 1.6; min-height: 180px;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--accent); }
        textarea::placeholder { color: #3a3a55; }

        /* ── CONTROLS ── */
        .controls {
            display: flex; align-items: flex-end; gap: 14px;
            margin-top: 16px; flex-wrap: wrap;
        }
        .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
        .ctrl-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }

        input[type="number"] {
            background: var(--dim); border: 1px solid var(--border);
            color: #fff; padding: 9px 12px; border-radius: 7px;
            font-family: var(--mono); font-size: 0.9rem; width: 90px;
            transition: border-color 0.2s;
        }
        input[type="number"]:focus { border-color: var(--accent); }

        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 9px 22px; border-radius: 7px;
            border: 1px solid var(--border);
            background: var(--dim); color: var(--text);
            font-family: var(--sans); font-weight: 600; font-size: 0.88rem;
            cursor: pointer; transition: all 0.18s; white-space: nowrap;
        }
        .btn:hover { background: #30303f; border-color: var(--accent); }
        .btn-accent { background: var(--accent); color: #000; border: none; box-shadow: 0 4px 16px var(--glow); }
        .btn-accent:hover { background: var(--accent2); transform: translateY(-1px); }

        /* ── MATH INFO ── */
        .math-bar {
            display: none;
            background: rgba(255,171,64,0.07);
            border: 1px solid rgba(255,171,64,0.2);
            border-radius: 7px; padding: 8px 14px;
            font-size: 0.82rem; color: var(--accent);
            font-family: var(--mono); margin-top: 14px;
        }

        /* ── RESULT GRID ── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .result-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 14px;
            display: flex; flex-direction: column;
            transition: border-color 0.2s;
        }
        .result-card:hover { border-color: var(--accent); }

        .card-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .part-label { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .part-meta { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); text-align: right; line-height: 1.4; }

        .result-preview {
            background: #000; border: 1px solid #222;
            border-radius: 5px; padding: 10px;
            height: 140px; overflow-y: auto;
            font-family: var(--mono); font-size: 0.75rem;
            color: #aaa; line-height: 1.5; white-space: pre;
            margin-bottom: 10px;
        }
        .result-preview::-webkit-scrollbar { width: 4px; }
        .result-preview::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .btn-copy-part {
            background: var(--dim); border: 1px solid var(--border);
            color: var(--text); padding: 7px; border-radius: 5px;
            cursor: pointer; transition: all 0.18s;
            font-family: var(--sans); font-size: 0.82rem; font-weight: 600;
        }
        .btn-copy-part:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-copy-part.done { background: var(--success); color: #000; border-color: var(--success); }

        /* ── COPY ALL BAR ── */
        .copy-all-bar {
            display: none;
            justify-content: flex-end; gap: 10px;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
            background: var(--success); color: #000;
            padding: 12px 24px; border-radius: 8px;
            font-weight: 700; font-size: 0.88rem;
            z-index: 999; opacity: 0;
            transition: all 0.3s; pointer-events: none; white-space: nowrap;
        }
        #toast.show { opacity: 1; bottom: 36px; }

        @media (max-width: 500px) {
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a href="index.html">📝 Editor & Splitter</a>
    <a href="rebuilder.html">🔗 Merger & Rebuilder</a>
    <a href="splitter.html" class="active">➗ Text Divider</a>
    <a href="corrector.html">✅ Correction Applier</a>
</nav>

<div class="page-header">
    <h1>AnimeSub <span>Divider</span></h1>
    <p>Equally divide lines into groups for batch translation</p>
</div>

<div class="wrap">

    <!-- INPUT -->
    <div class="input-card">
        <div class="input-head">
            <span class="card-title">Input Lines</span>
            <span class="line-badge" id="lineCount">0 lines</span>
        </div>
        <textarea id="inputText" placeholder="300+ လိုင်းတွေကို ဒီမှာ paste လုပ်ပါ..."></textarea>

        <div class="controls">
            <div class="ctrl-group">
                <label class="ctrl-label">Divide into (Parts)</label>
                <input type="number" id="partsInput" value="3" min="1" max="100">
            </div>
            <div class="ctrl-group">
                <label class="ctrl-label">Lines per Part</label>
                <input type="number" id="sizeInput" value="0" min="0" placeholder="Auto" title="Set manually, or leave 0 for auto from Parts">
            </div>
            <div class="ctrl-group">
                <label class="ctrl-label" title="Copy လိုက်ရင် label ပေါ်မှာ ဘယ်နှစ်ခု offset ထားမလဲ">Label Offset</label>
                <input type="number" id="offsetInput" value="1" min="0" style="width:70px;" title="Part 1 copy → Part (1+offset) label ပါလာမည်">
            </div>
            <button class="btn btn-accent" onclick="divideText()">⚡ Divide</button>
            <button class="btn" onclick="clearAll()">🗑️ Clear</button>
        </div>

        <div class="math-bar" id="mathBar"></div>
    </div>

    <!-- COPY ALL -->
    <div class="copy-all-bar" id="copyAllBar">
        <button class="btn" onclick="copyAllParts()">📋 Copy All Parts (sequential)</button>
    </div>

    <!-- RESULTS -->
    <div class="results-grid" id="resultsGrid"></div>

</div>

<div id="toast"></div>

<script>
    // ── State ──────────────────────────────────────────
    let currentParts = []; // Array of string arrays (each part's lines)

    // ── Line counter ───────────────────────────────────
    document.getElementById('inputText').addEventListener('input', () => {
        const count = getNonEmptyLines(document.getElementById('inputText').value).length;
        document.getElementById('lineCount').textContent = `${count} lines`;
    });

    function getNonEmptyLines(text) {
        return text.split(/\r?\n/).filter(l => l.trim() !== '');
    }

    // ── Divide ─────────────────────────────────────────
    function divideText() {
        const raw   = document.getElementById('inputText').value;
        const lines = raw.split(/\r?\n/);

        // Trim trailing empty line
        while (lines.length && lines[lines.length - 1].trim() === '') lines.pop();

        const total = lines.length;
        if (!total) { toast('Lines မရှိဘူး!', true); return; }

        const manualSize = parseInt(document.getElementById('sizeInput').value) || 0;
        let parts, baseSize, remainder;

        if (manualSize > 0) {
            // Manual: split by chunk size
            parts     = Math.ceil(total / manualSize);
            baseSize  = manualSize;
            remainder = 0;
        } else {
            // Auto: divide into N equal parts
            parts     = Math.max(1, parseInt(document.getElementById('partsInput').value) || 3);
            baseSize  = Math.floor(total / parts);
            remainder = total % parts;
        }

        // Math info bar
        const bar = document.getElementById('mathBar');
        bar.style.display = 'block';
        if (manualSize > 0) {
            bar.textContent = `${total} lines ÷ ${manualSize} per chunk = ${parts} parts`;
        } else {
            bar.textContent = `${total} ÷ ${parts} = ${baseSize} per part` +
                (remainder ? ` (+1 to first ${remainder} parts)` : '');
        }

        // Build chunks
        currentParts = [];
        let idx = 0;
        for (let i = 0; i < parts; i++) {
            const extra = (manualSize > 0) ? 0 : (i < remainder ? 1 : 0);
            const size  = (manualSize > 0) ? Math.min(manualSize, total - idx) : baseSize + extra;
            currentParts.push(lines.slice(idx, idx + size));
            idx += size;
            if (idx >= total) break;
        }

        renderCards();
        document.getElementById('copyAllBar').style.display = 'flex';
    }

    // ── Render ─────────────────────────────────────────
    function renderCards() {
        const grid = document.getElementById('resultsGrid');
        grid.innerHTML = '';

        currentParts.forEach((chunk, i) => {
            const card = document.createElement('div');
            card.className = 'result-card';

            const startLine = currentParts.slice(0, i).reduce((a, c) => a + c.length, 0) + 1;
            const endLine   = startLine + chunk.length - 1;

            // HEAD
            const head = document.createElement('div');
            head.className = 'card-head';
            head.innerHTML = `
                <span class="part-label">Part ${i + 1}</span>
                <span class="part-meta">${chunk.length} lines<br>L${startLine}–${endLine}</span>
            `;

            // PREVIEW — Bug fix: use textContent, not innerHTML (no XSS)
            const preview = document.createElement('div');
            preview.className = 'result-preview';
            preview.textContent = chunk.join('\n');   // ← safe, no HTML injection

            // COPY BTN — Bug fix: use data-index instead of onclick with encoded string
            const btn = document.createElement('button');
            btn.className = 'btn-copy-part';
            btn.textContent = `📋 Copy Part ${i + 1}`;
            btn.dataset.index = i;                    // ← safe data attribute
            btn.addEventListener('click', function() {
                const idx = parseInt(this.dataset.index);
                copyPart(idx, this);
            });

            card.append(head, preview, btn);
            grid.appendChild(card);
        });
    }

    // ── Copy single part ───────────────────────────────
    function copyPart(idx, btn) {
        const offset    = parseInt(document.getElementById('offsetInput').value) || 0;
        const labelNum  = idx + 1 + offset;          // e.g. Part 1 + offset 1 = Part 2
        const label     = `Part ${labelNum}`;
        const lines     = currentParts[idx].join('\n');
        const fullText  = `${label}\n${lines}`;

        navigator.clipboard.writeText(fullText).then(() => {
            toast(`Copied Part ${idx + 1} → labeled "${label}" (${currentParts[idx].length} lines)`);

            document.querySelectorAll('.btn-copy-part').forEach(b => {
                b.classList.remove('done');
                const bi = parseInt(b.dataset.index);
                b.textContent = `📋 Copy Part ${bi + 1}`;
            });
            btn.classList.add('done');
            btn.textContent = `✅ Copied (→ ${label})`;
        }).catch(() => toast('Copy failed — browser restriction', true));
    }

    // ── Copy all sequentially ──────────────────────────
    function copyAllParts() {
        if (!currentParts.length) { toast('Nothing to copy!', true); return; }
        const all = currentParts.map(p => p.join('\n')).join('\n\n--- --- ---\n\n');
        navigator.clipboard.writeText(all).then(() => toast(`Copied all ${currentParts.length} parts!`));
    }

    // ── Clear ──────────────────────────────────────────
    function clearAll() {
        document.getElementById('inputText').value = '';
        document.getElementById('lineCount').textContent = '0 lines';
        document.getElementById('mathBar').style.display = 'none';
        document.getElementById('resultsGrid').innerHTML = '';
        document.getElementById('copyAllBar').style.display = 'none';
        currentParts = [];
    }

    // ── Toast ──────────────────────────────────────────
    let toastTimer;
    function toast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.background = isError ? '#ff4444' : 'var(--success)';
        el.style.color = isError ? '#fff' : '#000';
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }
</script>
</body>
</html>
